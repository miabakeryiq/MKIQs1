<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>McKenzie's Kitchen Overlay Player (API)</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: #000;
      font-family: Arial, Helvetica, sans-serif;
    }
    .wrapper {
      position: fixed;
      top: 50%; left: 50%;
      width: 100vh; height: 100vw;
      transform: translate(-50%, -50%) rotate(90deg);
      transform-origin: center center;
      background: #000;
      overflow: hidden;
    }
    video, #overlay {
      position: absolute;
      inset: 0; width: 100%; height: 100%;
    }
    video { object-fit: cover; display: block; z-index: 1; }
    #overlay { pointer-events: none; z-index: 2; }
    .price-tag {
      position: absolute;
      transform: translate(-50%, -50%);
      color: #111;
      font-weight: 900;
      white-space: nowrap;
      letter-spacing: -0.03em;
      text-rendering: geometricPrecision;
      text-shadow: 0 0 1px rgba(255,255,255,.6), 0 1px 0 rgba(255,255,255,.35);
      font-variant-numeric: tabular-nums lining-nums;
      line-height: 1;
    }
    .status {
      position: fixed;
      right: 12px; bottom: 12px;
      z-index: 10;
      padding: 8px 10px;
      background: rgba(0,0,0,0.65);
      color: #fff;
      border-radius: 10px;
      font-size: 12px;
      opacity: .75;
    }
  </style>
</head>
<body>
  <div class="wrapper">
    <video id="player" loop playsinline webkit-playsinline muted preload="auto">
      <source src="PREVIEW.mov" type="video/mp4">
    </video>
    <div id="overlay"></div>
  </div>
  <div class="status" id="statusBox"></div>
 
  <script>
    const FALLBACK_PRICES = {
      "beef_liver_s":7,"beef_liver_m":12,"beef_liver_l":15,
      "ackee_saltfish_s":11,"ackee_saltfish_m":15,"ackee_saltfish_l":18,
      "callaloo_saltfish_s":7,"callaloo_saltfish_m":12,"callaloo_saltfish_l":15,
      "butterbeans_saltfish_s":7,"butterbeans_saltfish_m":12,"butterbeans_saltfish_l":15,
      "cookup_saltfish_s":7,"cookup_saltfish_m":12,"cookup_saltfish_l":15,
      "kidney_s":7,"kidney_m":12,"kidney_l":15,
      "stew_chicken_s":7,"stew_chicken_m":12,"stew_chicken_l":15,
      "porridge_oatmeal_s":5,"porridge_oatmeal_l":8,
      "porridge_peanut_s":5,"porridge_peanut_l":8,
      "porridge_plantain_s":5,"porridge_plantain_l":8,
      "porridge_carrot_s":5,"porridge_carrot_l":8,
      "porridge_cornmeal_s":5,"porridge_cornmeal_l":8,
      "porridge_hominy_s":5,"porridge_hominy_l":8,
      "patty_curry_chicken":3.5,"patty_beef_spicy":3.5,"patty_beef_mild":3.5,
      "patty_beefy_cheese":3.5,"patty_veggie":3.5,"patty_spinach":4.0,
      "patty_spinach_cheese":4.5,"patty_coco_bread":1.5,
      "soup_chicken_s":5,"soup_chicken_l":8,
      "soup_beef_s":5,"soup_beef_l":8,
      "soup_red_peas_s":5,"soup_red_peas_l":8,
      "soup_goat_s":5,"soup_goat_l":8,
      "soup_cowfoot_s":5,"soup_cowfoot_l":8,
      "bev_dg_soda":3.0,"bev_snapple":2.5,"bev_tropical_rhythm":2.5,
      "bev_canned_soda":1.0,"bev_water":1.0
    };
 
    const API_BASE  = window.MENU_API_BASE  || "https://mckcode.onrender.com";
    const SCREEN_ID = window.MENU_SCREEN_ID || "mckenzie-main";
    const POLL_MS   = window.MENU_POLL_MS   || 5000;
 
    const statusBox = document.getElementById("statusBox");
    function setStatus(t) { statusBox.textContent = t; }
 
    function formatPrice(value) {
      const n = Number(value);
      if (Number.isNaN(n)) return String(value ?? "");
      return Number.isInteger(n) ? String(n) : n.toFixed(2);
    }
 
    async function loadPrices() {
      try {
        const res = await fetch(
          `${API_BASE}/screens/${encodeURIComponent(SCREEN_ID)}/prices`,
          { cache: "no-store" }
        );
        if (!res.ok) throw new Error("price fetch failed");
        setStatus("");
        return await res.json();
      } catch(e) {
        setStatus("Using fallback prices.");
        return FALLBACK_PRICES;
      }
    }
 
    // Cache map — only fetch once, never re-fetch on poll
    let MAP_CACHE = null;
    async function getMap() {
      if (MAP_CACHE) return MAP_CACHE;
      const res = await fetch('overlay-map.json');
      if (!res.ok) throw new Error('Failed to load overlay-map.json');
      MAP_CACHE = await res.json();
      return MAP_CACHE;
    }
 
    // Build overlay DOM once — positions set here never change
    async function buildOverlay() {
      const map = await getMap();
      const overlay = document.getElementById("overlay");
      overlay.innerHTML = "";
      for (const item of map.items) {
        const el = document.createElement("div");
        el.className    = "price-tag";
        el.dataset.id   = item.id;
        el.dataset.type = item.type || "price";
        el.style.left      = `${(item.x / map.canvas.width)  * 100}%`;
        el.style.top       = `${(item.y / map.canvas.height) * 100}%`;
        el.style.fontSize  = `${item.fontSize || 16}px`;
        if (item.type === "label") {
          el.textContent          = item.label;
          el.style.color          = "#f5c518";
          el.style.textDecoration = "underline";
        } else {
          el.textContent = "";
        }
        overlay.appendChild(el);
      }
    }
 
    // Only update text content — no DOM rebuild, no position drift, no flicker
    async function updatePrices() {
      const prices = await loadPrices();
      for (const el of document.querySelectorAll(".price-tag")) {
        if (el.dataset.type === "label") continue;
        el.textContent = formatPrice(prices[el.dataset.id] ?? "");
      }
    }
 
    async function init() {
      await buildOverlay();
      await updatePrices();
      setInterval(updatePrices, POLL_MS);
    }
 
    const v = document.getElementById("player");
    function tryPlay() {
      v.play().catch(() => {
        document.addEventListener("click",      () => v.play(), { once: true });
        document.addEventListener("touchstart", () => v.play(), { once: true });
      });
    }
    v.addEventListener("loadeddata",     tryPlay);
    v.addEventListener("canplaythrough", tryPlay);
    setTimeout(tryPlay, 2000);
 
    init();
  </script>
</body>
</html>
