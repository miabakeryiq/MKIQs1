<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Overlay Editor — Operate Screen</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@700;800&display=swap');
    :root {
      --bg: #0d0d0d; --panel: #141414; --border: rgba(255,255,255,.08);
      --gold: #f5c518; --gold-dim: rgba(245,197,24,.15);
      --text: #f0f0f0; --muted: rgba(240,240,240,.45);
      --input-bg: #0a0a0a; --sidebar: 320px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: 'DM Mono', monospace; display: flex; height: 100vh; overflow: hidden; }
    aside { width: var(--sidebar); min-width: var(--sidebar); height: 100vh; display: flex; flex-direction: column; border-right: 1px solid var(--border); background: var(--panel); overflow: hidden; }
    .sidebar-head { padding: 20px 20px 14px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
    .sidebar-head h1 { font-family: 'Syne', sans-serif; font-size: 18px; font-weight: 800; letter-spacing: -.02em; color: var(--gold); margin-bottom: 4px; }
    .sidebar-head p { font-size: 11px; color: var(--muted); line-height: 1.5; }
    .sidebar-body { flex: 1; overflow-y: auto; padding: 16px 20px; }
    .sidebar-body::-webkit-scrollbar { width: 4px; }
    .sidebar-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
    .status-bar { font-size: 11px; padding: 8px 12px; background: var(--gold-dim); border: 1px solid rgba(245,197,24,.2); border-radius: 8px; color: var(--gold); margin-bottom: 16px; }
    .section-label { font-size: 10px; text-transform: uppercase; letter-spacing: .1em; color: var(--muted); margin-bottom: 8px; margin-top: 16px; }
    .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 8px; }
    .field { display: flex; flex-direction: column; gap: 4px; }
    .field label { font-size: 10px; text-transform: uppercase; letter-spacing: .08em; color: var(--muted); }
    .field input { background: var(--input-bg); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-family: 'DM Mono', monospace; font-size: 13px; padding: 8px 10px; width: 100%; transition: border-color .15s; }
    .field input:focus { outline: none; border-color: var(--gold); }
    .field input[readonly] { color: var(--gold); background: var(--gold-dim); border-color: rgba(245,197,24,.2); }
    .hint { font-size: 11px; color: var(--muted); line-height: 1.6; padding: 10px 12px; background: rgba(255,255,255,.03); border-radius: 8px; margin-bottom: 4px; }
    .toolbar { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; }
    button { font-family: 'DM Mono', monospace; font-size: 12px; font-weight: 500; border: 0; border-radius: 8px; padding: 9px 14px; cursor: pointer; transition: opacity .15s, transform .1s; }
    button:active { transform: scale(.97); }
    button.primary { background: var(--gold); color: #111; }
    button.secondary { background: rgba(255,255,255,.07); color: var(--text); border: 1px solid var(--border); }
    button:hover { opacity: .85; }
    .item-list { display: flex; flex-direction: column; gap: 4px; max-height: 280px; overflow-y: auto; padding-right: 2px; }
    .item-list::-webkit-scrollbar { width: 3px; }
    .item-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    .list-item { padding: 7px 10px; border-radius: 7px; font-size: 12px; cursor: pointer; border: 1px solid transparent; transition: background .1s, border-color .1s; color: var(--muted); }
    .list-item:hover { background: rgba(255,255,255,.04); color: var(--text); }
    .list-item.active { background: var(--gold-dim); border-color: rgba(245,197,24,.3); color: var(--gold); }
    textarea { width: 100%; min-height: 160px; margin-top: 12px; border-radius: 10px; border: 1px solid var(--border); background: var(--input-bg); color: rgba(240,240,240,.7); padding: 12px; font-family: 'DM Mono', monospace; font-size: 11px; resize: vertical; }
    main { flex: 1; overflow: auto; display: flex; align-items: flex-start; justify-content: center; padding: 24px; background: var(--bg); }
    .stage-wrapper { width: min(900px, calc(100vw - var(--sidebar) - 48px)); aspect-ratio: 1780 / 1080; position: relative; flex-shrink: 0; }
    .stage { position: absolute; transform-origin: top left; overflow: hidden; border: 1px solid var(--border); box-shadow: 0 24px 80px rgba(0,0,0,.6); }
    .frame-img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: fill; display: block; z-index: 1; user-select: none; pointer-events: none; }
    #overlay { position: absolute; inset: 0; z-index: 2; }
    .overlay-item { position: absolute; transform: translate(-50%, -50%); color: #111; font-weight: 900; white-space: nowrap; cursor: grab; user-select: none; line-height: 1; font-variant-numeric: tabular-nums; font-family: Arial, Helvetica, sans-serif; text-shadow: 0 0 1px rgba(255,255,255,.6), 0 1px 0 rgba(255,255,255,.35); }
    .overlay-item.active { outline: 1.5px dashed var(--gold); outline-offset: 3px; z-index: 10; }
    .overlay-item:active { cursor: grabbing; }
  </style>
</head>
<body>
  <aside>
    <div class="sidebar-head">
      <h1>Operate Editor</h1>
      <p>Screen 2 — Main Entrees, Chicken Only, Sides.<br>Canvas matches player orientation.</p>
    </div>
    <div class="sidebar-body">
      <div class="status-bar" id="saveStatus">Loading…</div>
      <div class="toolbar">
        <button class="primary" id="copyBtn">Copy JSON</button>
        <button class="secondary" id="downloadBtn">Download</button>
        <button class="secondary" id="resetBtn">Reset</button>
      </div>
      <div class="section-label">Selected item</div>
      <div class="field" style="margin-bottom:8px">
        <label>ID</label>
        <input id="selectedId" readonly />
      </div>
      <div class="field-row">
        <div class="field"><label>X</label><input id="posX" type="number" step="1" /></div>
        <div class="field"><label>Y</label><input id="posY" type="number" step="1" /></div>
      </div>
      <div class="field" style="margin-bottom:12px">
        <label>Font size (px)</label>
        <input id="fontSize" type="number" step="1" min="8" max="120" />
      </div>
      <div class="hint">Arrow keys nudge 1px · Shift+Arrow = 10px</div>
      <div class="section-label" style="margin-top:14px">All items</div>
      <div class="item-list" id="list"></div>
      <textarea id="exportBox" spellcheck="false"></textarea>
    </div>
  </aside>

  <main>
    <div class="stage-wrapper" id="stageWrapper">
      <div class="stage" id="stage">
        <img src="./screen2.png" alt="" class="frame-img" />
        <div id="overlay"></div>
      </div>
    </div>
  </main>

  <script>
    const DEFAULT_MAP = {"canvas":{"width":1080,"height":1780},"items":[{"id":"jerk_wings_s","label":"Jerk Wings S","x":300,"y":400,"fontSize":23},{"id":"jerk_wings_m","label":"Jerk Wings M","x":370,"y":400,"fontSize":23},{"id":"jerk_wings_l","label":"Jerk Wings L","x":440,"y":400,"fontSize":23},{"id":"stew_chicken_s","label":"Stew Chicken S","x":300,"y":445,"fontSize":23},{"id":"stew_chicken_m","label":"Stew Chicken M","x":370,"y":445,"fontSize":23},{"id":"stew_chicken_l","label":"Stew Chicken L","x":440,"y":445,"fontSize":23},{"id":"fried_chicken_s","label":"Fried Chicken S","x":300,"y":490,"fontSize":23},{"id":"fried_chicken_m","label":"Fried Chicken M","x":370,"y":490,"fontSize":23},{"id":"fried_chicken_l","label":"Fried Chicken L","x":440,"y":490,"fontSize":23},{"id":"escovitch_chicken_s","label":"Escovitch Chicken S","x":300,"y":535,"fontSize":23},{"id":"escovitch_chicken_m","label":"Escovitch Chicken M","x":370,"y":535,"fontSize":23},{"id":"escovitch_chicken_l","label":"Escovitch Chicken L","x":440,"y":535,"fontSize":23},{"id":"jerk_chicken_s","label":"Jerk Chicken S","x":300,"y":580,"fontSize":23},{"id":"jerk_chicken_m","label":"Jerk Chicken M","x":370,"y":580,"fontSize":23},{"id":"jerk_chicken_l","label":"Jerk Chicken L","x":440,"y":580,"fontSize":23},{"id":"curry_chicken_s","label":"Curry Chicken S","x":300,"y":625,"fontSize":23},{"id":"curry_chicken_m","label":"Curry Chicken M","x":370,"y":625,"fontSize":23},{"id":"curry_chicken_l","label":"Curry Chicken L","x":440,"y":625,"fontSize":23},{"id":"stew_peas_s","label":"Stew Peas S","x":300,"y":670,"fontSize":23},{"id":"stew_peas_m","label":"Stew Peas M","x":370,"y":670,"fontSize":23},{"id":"stew_peas_l","label":"Stew Peas L","x":440,"y":670,"fontSize":23},{"id":"escovitch_whiting_s","label":"Escovitch Whiting S","x":300,"y":715,"fontSize":23},{"id":"escovitch_whiting_m","label":"Escovitch Whiting M","x":370,"y":715,"fontSize":23},{"id":"escovitch_whiting_l","label":"Escovitch Whiting L","x":440,"y":715,"fontSize":23},{"id":"curry_goat_s","label":"Curry Goat S","x":300,"y":760,"fontSize":23},{"id":"curry_goat_m","label":"Curry Goat M","x":370,"y":760,"fontSize":23},{"id":"curry_goat_l","label":"Curry Goat L","x":440,"y":760,"fontSize":23},{"id":"oxtail_s","label":"Oxtail S","x":300,"y":805,"fontSize":23},{"id":"oxtail_m","label":"Oxtail M","x":370,"y":805,"fontSize":23},{"id":"oxtail_l","label":"Oxtail L","x":440,"y":805,"fontSize":23},{"id":"salmon_s","label":"Salmon S","x":300,"y":850,"fontSize":23},{"id":"salmon_m","label":"Salmon M","x":370,"y":850,"fontSize":23},{"id":"salmon_l","label":"Salmon L","x":440,"y":850,"fontSize":23},{"id":"glazed_salmon_s","label":"Glazed Salmon S","x":300,"y":895,"fontSize":23},{"id":"glazed_salmon_m","label":"Glazed Salmon M","x":370,"y":895,"fontSize":23},{"id":"glazed_salmon_l","label":"Glazed Salmon L","x":440,"y":895,"fontSize":23},{"id":"snapper_s","label":"Snapper S","x":300,"y":940,"fontSize":23},{"id":"snapper_m","label":"Snapper M","x":370,"y":940,"fontSize":23},{"id":"snapper_l","label":"Snapper L","x":440,"y":940,"fontSize":23},{"id":"chicken_jerk_quarter","label":"Jerk Quarter","x":200,"y":1100,"fontSize":23},{"id":"chicken_jerk_half","label":"Jerk Half","x":290,"y":1100,"fontSize":23},{"id":"chicken_fry_quarter","label":"Fry Quarter","x":200,"y":1150,"fontSize":23},{"id":"chicken_fry_half","label":"Fry Half","x":290,"y":1150,"fontSize":23},{"id":"chicken_wings_5pc","label":"Wings 5pc","x":200,"y":1200,"fontSize":23},{"id":"side_cabbage_s","label":"Cabbage S","x":650,"y":1100,"fontSize":23},{"id":"side_cabbage_m","label":"Cabbage M","x":740,"y":1100,"fontSize":23},{"id":"side_cabbage_l","label":"Cabbage L","x":830,"y":1100,"fontSize":23},{"id":"side_white_rice_s","label":"White Rice S","x":650,"y":1150,"fontSize":23},{"id":"side_white_rice_m","label":"White Rice M","x":740,"y":1150,"fontSize":23},{"id":"side_white_rice_l","label":"White Rice L","x":830,"y":1150,"fontSize":23},{"id":"side_mac_cheese_s","label":"Mac & Cheese S","x":650,"y":1200,"fontSize":23},{"id":"side_mac_cheese_m","label":"Mac & Cheese M","x":740,"y":1200,"fontSize":23},{"id":"side_mac_cheese_l","label":"Mac & Cheese L","x":830,"y":1200,"fontSize":23},{"id":"side_festival_s","label":"Festival S","x":650,"y":1250,"fontSize":23},{"id":"side_festival_m","label":"Festival M","x":740,"y":1250,"fontSize":23},{"id":"side_festival_l","label":"Festival L","x":830,"y":1250,"fontSize":23},{"id":"side_fried_plantain_s","label":"Fried Plantain S","x":650,"y":1300,"fontSize":23},{"id":"side_fried_plantain_m","label":"Fried Plantain M","x":740,"y":1300,"fontSize":23},{"id":"side_fried_plantain_l","label":"Fried Plantain L","x":830,"y":1300,"fontSize":23},{"id":"side_fried_dumplings_s","label":"Fried Dumplings S","x":650,"y":1350,"fontSize":23},{"id":"side_fried_dumplings_m","label":"Fried Dumplings M","x":740,"y":1350,"fontSize":23},{"id":"side_fried_dumplings_l","label":"Fried Dumplings L","x":830,"y":1350,"fontSize":23},{"id":"side_pasta_s","label":"Pasta S","x":650,"y":1400,"fontSize":23},{"id":"side_pasta_m","label":"Pasta M","x":740,"y":1400,"fontSize":23},{"id":"side_pasta_l","label":"Pasta L","x":830,"y":1400,"fontSize":23}]};

    const PRICE_VALUES = {"jerk_wings_s":0,"jerk_wings_m":0,"jerk_wings_l":0,"stew_chicken_s":0,"stew_chicken_m":0,"stew_chicken_l":0,"fried_chicken_s":0,"fried_chicken_m":0,"fried_chicken_l":0,"escovitch_chicken_s":0,"escovitch_chicken_m":0,"escovitch_chicken_l":0,"jerk_chicken_s":0,"jerk_chicken_m":0,"jerk_chicken_l":0,"curry_chicken_s":0,"curry_chicken_m":0,"curry_chicken_l":0,"stew_peas_s":0,"stew_peas_m":0,"stew_peas_l":0,"escovitch_whiting_s":0,"escovitch_whiting_m":0,"escovitch_whiting_l":0,"curry_goat_s":0,"curry_goat_m":0,"curry_goat_l":0,"oxtail_s":0,"oxtail_m":0,"oxtail_l":0,"salmon_s":0,"salmon_m":0,"salmon_l":0,"glazed_salmon_s":0,"glazed_salmon_m":0,"glazed_salmon_l":0,"snapper_s":0,"snapper_m":0,"snapper_l":0,"chicken_jerk_quarter":0,"chicken_jerk_half":0,"chicken_fry_quarter":0,"chicken_fry_half":0,"chicken_wings_5pc":0,"side_cabbage_s":0,"side_cabbage_m":0,"side_cabbage_l":0,"side_white_rice_s":0,"side_white_rice_m":0,"side_white_rice_l":0,"side_mac_cheese_s":0,"side_mac_cheese_m":0,"side_mac_cheese_l":0,"side_festival_s":0,"side_festival_m":0,"side_festival_l":0,"side_fried_plantain_s":0,"side_fried_plantain_m":0,"side_fried_plantain_l":0,"side_fried_dumplings_s":0,"side_fried_dumplings_m":0,"side_fried_dumplings_l":0,"side_pasta_s":0,"side_pasta_m":0,"side_pasta_l":0};

    const STORAGE_KEY = "mckenzie_overlay_editor_operate_v1";
    const CW = 1080, CH = 1780;

    function clone(o) { return JSON.parse(JSON.stringify(o)); }
    function loadMap() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return clone(DEFAULT_MAP);
        const p = JSON.parse(raw);
        return (!p || !Array.isArray(p.items)) ? clone(DEFAULT_MAP) : p;
      } catch(e) { return clone(DEFAULT_MAP); }
    }

    const state = { map: loadMap(), activeId: null };
    function getItem(id) { return state.map.items.find(i => i.id === id); }

    const stageWrapper = document.getElementById('stageWrapper');
    const stage = document.getElementById('stage');

    function layoutStage() {
      const wrapW = stageWrapper.clientWidth;
      const wrapH = stageWrapper.clientHeight;
      const sw = wrapH, sh = wrapW;
      stage.style.width  = sw + 'px';
      stage.style.height = sh + 'px';
      stage.style.transform = `rotate(90deg) translateY(-${sw}px)`;
      stage.style.transformOrigin = 'top left';
      renderOverlay();
    }
    window.addEventListener('resize', layoutStage);

    function formatPrice(v) {
      const n = Number(v);
      if (Number.isNaN(n)) return String(v ?? '');
      return Number.isInteger(n) ? String(n) : n.toFixed(2);
    }

    function renderOverlay() {
      const overlay = document.getElementById('overlay');
      overlay.innerHTML = '';
      const sw = parseFloat(stage.style.width)  || stage.clientWidth;
      const sh = parseFloat(stage.style.height) || stage.clientHeight;
      for (const item of state.map.items) {
        const el = document.createElement('div');
        el.className = 'overlay-item' + (item.id === state.activeId ? ' active' : '');
        el.dataset.id = item.id;
        el.style.left = (item.x / CW * 100) + '%';
        el.style.top  = (item.y / CH * 100) + '%';
        el.style.fontSize = (item.fontSize || 16) + 'px';
        el.textContent = formatPrice(PRICE_VALUES[item.id] ?? '');
        attachDrag(el, item.id, sw, sh);
        el.addEventListener('click', e => { e.stopPropagation(); setActive(item.id); });
        overlay.appendChild(el);
      }
      renderList(); renderExport(); syncInputs();
    }

    function attachDrag(el, id) {
      let dragging = false;
      function toCanvas(clientX, clientY) {
        const rect = stage.getBoundingClientRect();
        const rx = (clientX - rect.left) / rect.width;
        const ry = (clientY - rect.top)  / rect.height;
        return {
          x: Math.max(0, Math.min(CW, Math.round(ry * CW))),
          y: Math.max(0, Math.min(CH, Math.round((1 - rx) * CH)))
        };
      }
      el.addEventListener('pointerdown', e => {
        dragging = true; el.setPointerCapture(e.pointerId); setActive(id);
        const pos = toCanvas(e.clientX, e.clientY);
        const item = getItem(id); item.x = pos.x; item.y = pos.y;
        renderOverlay(); e.stopPropagation();
      });
      el.addEventListener('pointermove', e => {
        if (!dragging) return;
        const pos = toCanvas(e.clientX, e.clientY);
        const item = getItem(id); item.x = pos.x; item.y = pos.y;
        renderOverlay(); queueSave();
      });
      el.addEventListener('pointerup',     () => { dragging = false; });
      el.addEventListener('pointercancel', () => { dragging = false; });
    }

    document.addEventListener('keydown', e => {
      const item = getItem(state.activeId); if (!item) return;
      const step = e.shiftKey ? 10 : 1;
      if      (e.key === 'ArrowLeft')  item.x -= step;
      else if (e.key === 'ArrowRight') item.x += step;
      else if (e.key === 'ArrowUp')    item.y -= step;
      else if (e.key === 'ArrowDown')  item.y += step;
      else return;
      item.x = Math.max(0, Math.min(CW, item.x));
      item.y = Math.max(0, Math.min(CH, item.y));
      renderOverlay(); queueSave(); e.preventDefault();
    });

    const selectedIdEl = document.getElementById('selectedId');
    const posXEl       = document.getElementById('posX');
    const posYEl       = document.getElementById('posY');
    const fontSizeEl   = document.getElementById('fontSize');
    const saveStatusEl = document.getElementById('saveStatus');
    const exportBox    = document.getElementById('exportBox');

    function syncInputs() {
      const item = getItem(state.activeId);
      selectedIdEl.value = item?.id || '';
      posXEl.value       = item?.x  ?? '';
      posYEl.value       = item?.y  ?? '';
      fontSizeEl.value   = item?.fontSize ?? 16;
    }

    function setActive(id) { state.activeId = id; renderOverlay(); }

    posXEl.addEventListener('input', () => {
      const item = getItem(state.activeId); if (!item) return;
      const n = Number(posXEl.value); if (isNaN(n)) return;
      item.x = Math.max(0, Math.min(CW, Math.round(n)));
      renderOverlay(); queueSave();
    });
    posYEl.addEventListener('input', () => {
      const item = getItem(state.activeId); if (!item) return;
      const n = Number(posYEl.value); if (isNaN(n)) return;
      item.y = Math.max(0, Math.min(CH, Math.round(n)));
      renderOverlay(); queueSave();
    });
    fontSizeEl.addEventListener('input', () => {
      const item = getItem(state.activeId); if (!item) return;
      const n = Number(fontSizeEl.value); if (isNaN(n)) return;
      item.fontSize = Math.max(8, Math.min(120, Math.round(n)));
      renderOverlay(); queueSave();
    });

    function renderList() {
      const list = document.getElementById('list');
      list.innerHTML = '';
      for (const item of state.map.items) {
        const el = document.createElement('div');
        el.className = 'list-item' + (item.id === state.activeId ? ' active' : '');
        el.textContent = item.label;
        el.onclick = () => setActive(item.id);
        list.appendChild(el);
      }
    }

    function renderExport() { exportBox.value = JSON.stringify(state.map, null, 2); }

    exportBox.addEventListener('change', () => {
      try {
        const p = JSON.parse(exportBox.value);
        if (!p || !Array.isArray(p.items)) throw new Error('bad');
        state.map = p;
        if (!getItem(state.activeId)) state.activeId = state.map.items[0]?.id ?? null;
        renderOverlay(); setStatus('Loaded from JSON box.');
      } catch(e) { setStatus('Invalid JSON.'); }
    });

    function setStatus(t) { saveStatusEl.textContent = t; }
    let saveTimer = null;
    function queueSave() {
      clearTimeout(saveTimer);
      saveTimer = setTimeout(() => {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(state.map));
        setStatus('Autosaved.');
      }, 150);
    }

    document.getElementById('copyBtn').onclick = async () => {
      await navigator.clipboard.writeText(JSON.stringify(state.map, null, 2));
      setStatus('JSON copied to clipboard.');
    };
    document.getElementById('downloadBtn').onclick = () => {
      const blob = new Blob([JSON.stringify(state.map, null, 2)], { type: 'application/json' });
      const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
      a.download = 'overlay-map-operate.json'; a.click(); URL.revokeObjectURL(a.href);
      setStatus('Downloaded overlay-map-operate.json');
    };
    document.getElementById('resetBtn').onclick = () => {
      localStorage.removeItem(STORAGE_KEY);
      state.map = clone(DEFAULT_MAP);
      state.activeId = state.map.items[0]?.id ?? null;
      layoutStage(); setStatus('Reset to default map.');
    };
    document.getElementById('overlay').addEventListener('click', () => { state.activeId = null; renderOverlay(); });
    window.addEventListener('resize', renderStage);

    function renderStage() { layoutStage(); }

    setStatus(localStorage.getItem(STORAGE_KEY) ? 'Loaded autosaved map.' : 'Using default map.');
    state.activeId = state.map.items[0]?.id ?? null;
    window.addEventListener('load', layoutStage);
    if (document.readyState === 'complete') layoutStage();
  </script>
</body>
</html>
