<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>McKenzie's Kitchen — Operate Screen Player</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: #000;
      font-family: Arial, Helvetica, sans-serif;
    }
    .wrapper {
      position: fixed;
      top: 50%; left: 50%;
      width: 100vh; height: 100vw;
      transform: translate(-50%, -50%) rotate(90deg);
      transform-origin: center center;
      background: #000;
      overflow: hidden;
    }
    video, #overlay {
      position: absolute;
      inset: 0; width: 100%; height: 100%;
    }
    video {
      object-fit: cover;
      display: block;
      z-index: 1;
    }
    #overlay {
      pointer-events: none;
      z-index: 2;
    }
    .price-tag {
      position: absolute;
      transform: translate(-50%, -50%);
      color: #111;
      font-weight: 900;
      white-space: nowrap;
      letter-spacing: -0.03em;
      text-rendering: geometricPrecision;
      text-shadow:
        0 0 1px rgba(255,255,255,.6),
        0 1px 0 rgba(255,255,255,.35);
      font-variant-numeric: tabular-nums lining-nums;
      line-height: 1;
    }
    .status {
      position: fixed;
      right: 12px; bottom: 12px;
      z-index: 10;
      padding: 8px 10px;
      background: rgba(0,0,0,0.65);
      color: #fff;
      border-radius: 10px;
      font-size: 12px;
      opacity: .75;
    }
  </style>
</head>
<body>
  <div class="wrapper">
    <video id="player" loop playsinline webkit-playsinline muted preload="auto">
      <source src="PREVIEW-operate.mov" type="video/mp4">
    </video>
    <div id="overlay"></div>
  </div>
  <div class="status" id="statusBox">Operate screen ready.</div>

  <script>
    async function loadOverlayMap() {
      const res = await fetch('overlay-map-operate.json');
      if (!res.ok) throw new Error('Failed to load overlay-map-operate.json');
      return await res.json();
    }

    const FALLBACK_PRICES = {
      "jerk_wings_s":0,"jerk_wings_m":0,"jerk_wings_l":0,
      "stew_chicken_s":0,"stew_chicken_m":0,"stew_chicken_l":0,
      "fried_chicken_s":0,"fried_chicken_m":0,"fried_chicken_l":0,
      "escovitch_chicken_s":0,"escovitch_chicken_m":0,"escovitch_chicken_l":0,
      "jerk_chicken_s":0,"jerk_chicken_m":0,"jerk_chicken_l":0,
      "curry_chicken_s":0,"curry_chicken_m":0,"curry_chicken_l":0,
      "stew_peas_s":0,"stew_peas_m":0,"stew_peas_l":0,
      "escovitch_whiting_s":0,"escovitch_whiting_m":0,"escovitch_whiting_l":0,
      "curry_goat_s":0,"curry_goat_m":0,"curry_goat_l":0,
      "oxtail_s":0,"oxtail_m":0,"oxtail_l":0,
      "salmon_s":0,"salmon_m":0,"salmon_l":0,
      "glazed_salmon_s":0,"glazed_salmon_m":0,"glazed_salmon_l":0,
      "snapper_s":0,"snapper_m":0,"snapper_l":0,
      "chicken_jerk_quarter":0,"chicken_jerk_half":0,
      "chicken_fry_quarter":0,"chicken_fry_half":0,"chicken_wings_5pc":0,
      "side_cabbage_s":0,"side_cabbage_m":0,"side_cabbage_l":0,
      "side_white_rice_s":0,"side_white_rice_m":0,"side_white_rice_l":0,
      "side_mac_cheese_s":0,"side_mac_cheese_m":0,"side_mac_cheese_l":0,
      "side_festival_s":0,"side_festival_m":0,"side_festival_l":0,
      "side_fried_plantain_s":0,"side_fried_plantain_m":0,"side_fried_plantain_l":0,
      "side_fried_dumplings_s":0,"side_fried_dumplings_m":0,"side_fried_dumplings_l":0,
      "side_pasta_s":0,"side_pasta_m":0,"side_pasta_l":0
    };

    // ← Set to your Render URL
    const API_BASE   = window.MENU_API_BASE   || "https://mckcode.onrender.com";
    const SCREEN_ID  = window.MENU_SCREEN_ID  || "mckenzie-operate";
    const POLL_MS    = window.MENU_POLL_MS    || 5000;

    const statusBox = document.getElementById("statusBox");
    function setStatus(t) { statusBox.textContent = t; }

    function formatPrice(value) {
      const n = Number(value);
      if (Number.isNaN(n)) return String(value ?? "");
      return Number.isInteger(n) ? String(n) : n.toFixed(2);
    }

    async function loadPrices() {
      try {
        const res = await fetch(`${API_BASE}/screens/${encodeURIComponent(SCREEN_ID)}/prices`, { cache: "no-store" });
        if (!res.ok) throw new Error("price fetch failed");
        setStatus("");
        return await res.json();
      } catch (e) {
        setStatus("Using fallback prices. API unavailable.");
        return FALLBACK_PRICES;
      }
    }

    async function renderOverlay() {
      const [OVERLAY_MAP, prices] = await Promise.all([loadOverlayMap(), loadPrices()]);
      const overlay = document.getElementById("overlay");
      overlay.innerHTML = "";
      for (const item of OVERLAY_MAP.items) {
        const el = document.createElement("div");
        el.className = "price-tag";
        el.dataset.id = item.id;
        el.style.left = `${(item.x / OVERLAY_MAP.canvas.width) * 100}%`;
        el.style.top  = `${(item.y / OVERLAY_MAP.canvas.height) * 100}%`;
        el.style.fontSize = `${item.fontSize || 16}px`;
        el.textContent = formatPrice(prices[item.id] ?? "");
        overlay.appendChild(el);
      }
    }

    const v = document.getElementById("player");
    function tryPlay() {
      v.play().catch(() => {
        document.addEventListener("click",      () => v.play(), { once: true });
        document.addEventListener("touchstart", () => v.play(), { once: true });
      });
    }
    v.addEventListener("loadeddata",    tryPlay);
    v.addEventListener("canplaythrough", tryPlay);
    setTimeout(tryPlay, 2000);

    renderOverlay();
    setInterval(renderOverlay, POLL_MS);
  </script>
</body>
</html>
