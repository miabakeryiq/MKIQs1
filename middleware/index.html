<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>MCK Middleware</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@700;800&display=swap" rel="stylesheet">
  <script crossorigin src="https://cdn.jsdelivr.net/npm/react@18.3.1/umd/react.production.min.js"></script>
  <script crossorigin src="https://cdn.jsdelivr.net/npm/react-dom@18.3.1/umd/react-dom.production.min.js"></script>
  <style>
    :root {
      --bg: #ffffff;
      --surface: #f8fafc;
      --surface2: #f1f5f9;
      --border: rgba(0,0,0,.1);
      --gold: #f5c518;
      --gold-dim: rgba(245,197,24,.15);
      --gold-border: rgba(245,197,24,.25);
      --text: #0f172a;
      --muted: rgba(15,23,42,.45);
      --green: #22c55e;
      --blue: #3b82f6;
      --red: #ef4444;
      --radius: 14px;
      --radius-sm: 10px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    html, body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      min-height: 100vh;
      overscroll-behavior: none;
    }

    #root { min-height: 100vh; }

    /* ── LAYOUT ── */
    .app { max-width: 680px; margin: 0 auto; padding: 16px 16px 100px; }

    /* ── HEADER ── */
    .header { padding: 8px 0 20px; display: flex; align-items: center; gap: 14px; }
    .header-logo { height: 160px; width: auto; flex-shrink: 0; }
    .header-text {}
    .header h1 {
      font-family: 'Syne', sans-serif;
      font-size: 26px; font-weight: 800;
      letter-spacing: -.03em;
      color: var(--gold);
      line-height: 1;
    }
    .header p { font-size: 12px; color: var(--muted); margin-top: 5px; }

    /* ── SCREEN TABS ── */
    .screen-tabs {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 14px;
    }
    .tab {
      padding: 13px 10px;
      border-radius: var(--radius-sm);
      border: 1.5px solid var(--border);
      background: var(--surface);
      color: var(--muted);
      font-family: 'DM Mono', monospace;
      font-size: 12px; font-weight: 500;
      cursor: pointer;
      transition: all .15s;
      text-align: center;
      line-height: 1.3;
    }
    .tab.active {
      border-color: var(--gold);
      background: var(--gold-dim);
      color: var(--gold);
    }
    .tab-label { font-family: 'Syne', sans-serif; font-size: 13px; font-weight: 700; display: block; }
    .tab-sub { font-size: 10px; opacity: .7; display: block; margin-top: 2px; }

    /* ── STATUS BAR ── */
    .status-bar {
      padding: 11px 14px;
      border-radius: var(--radius-sm);
      background: var(--surface);
      border: 1px solid var(--border);
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 14px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
    }
    .status-bar .msg { flex: 1; }
    .status-bar .count {
      font-size: 11px;
      background: var(--surface2);
      padding: 4px 8px;
      border-radius: 20px;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .status-ok   { color: var(--green); }
    .status-err  { color: var(--red); }
    .status-info { color: var(--gold); }

    /* ── SEARCH + ACTIONS ── */
    .controls {
      display: flex;
      gap: 8px;
      margin-bottom: 14px;
    }
    .search-wrap { flex: 1; position: relative; }
    .search-wrap input {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      font-size: 14px;
      padding: 12px 14px;
      transition: border-color .15s;
      -webkit-appearance: none;
    }
    .search-wrap input:focus { outline: none; border-color: var(--gold); }
    .search-wrap input::placeholder { color: var(--muted); }

    .btn {
      font-family: 'DM Mono', monospace;
      font-size: 13px; font-weight: 500;
      border: 0; border-radius: var(--radius-sm);
      padding: 12px 16px;
      cursor: pointer;
      transition: opacity .15s, transform .1s;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .btn:active { transform: scale(.96); opacity: .85; }
    .btn-ghost  { background: var(--surface); color: var(--text); border: 1px solid var(--border); }
    .btn-green  { background: var(--green); color: #fff; }
    .btn-dark   { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
    .btn-blue   { background: var(--blue); color: #fff; }
    .btn:disabled { opacity: .4; pointer-events: none; }

    /* ── PUSH SELECTED BAR ── */
    .push-bar {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      padding: 12px 16px;
      background: rgba(10,10,10,.95);
      backdrop-filter: blur(12px);
      border-top: 1px solid var(--border);
      display: flex;
      gap: 10px;
      align-items: center;
      z-index: 100;
    }
    .push-bar .push-info { flex: 1; font-size: 12px; color: var(--muted); }
    .push-bar .push-info strong { color: var(--text); }

    /* ── SECTION HEADER ── */
    .section-head {
      font-family: 'Syne', sans-serif;
      font-size: 11px; font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .1em;
      color: var(--muted);
      padding: 6px 0 8px;
      margin-top: 8px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 6px;
    }

    /* ── ITEM CARDS ── */
    .item-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px;
      margin-bottom: 8px;
      transition: border-color .15s;
    }
    .item-card.selected {
      border-color: var(--gold);
      background: var(--gold-dim);
    }

    .card-top {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 10px;
    }
    .card-check {
      width: 22px; height: 22px;
      border-radius: 6px;
      border: 2px solid var(--border);
      background: var(--surface2);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; flex-shrink: 0;
      transition: all .15s;
    }
    .card-check.checked {
      background: var(--gold);
      border-color: var(--gold);
    }
    .card-check.checked::after {
      content: '✓';
      font-size: 13px;
      color: #111;
      font-weight: 900;
    }
    .card-name {
      flex: 1;
      font-family: 'Syne', sans-serif;
      font-size: 14px; font-weight: 700;
      color: var(--text);
      line-height: 1.2;
    }
    .card-id {
      font-size: 10px;
      color: var(--muted);
      font-family: 'DM Mono', monospace;
      margin-top: 2px;
    }

    .card-prices {
      display: grid;
      grid-template-columns: 1fr 1fr auto;
      gap: 8px;
      align-items: center;
    }
    .price-field { display: flex; flex-direction: column; gap: 4px; }
    .price-label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: .06em; }
    .price-live {
      font-size: 20px; font-weight: 500;
      color: var(--green);
      font-variant-numeric: tabular-nums;
      line-height: 1;
    }
    .price-live.zero { color: var(--muted); }
    .price-input {
      background: var(--surface2);
      border: 1.5px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-family: 'DM Mono', monospace;
      font-size: 18px; font-weight: 500;
      padding: 10px 12px;
      width: 100%;
      -webkit-appearance: none;
      transition: border-color .15s;
      font-variant-numeric: tabular-nums;
    }
    .price-input:focus { outline: none; border-color: var(--gold); }
    .push-single {
      font-family: 'DM Mono', monospace;
      font-size: 12px; font-weight: 500;
      border: 0; border-radius: 8px;
      padding: 10px 12px;
      background: var(--blue);
      color: #fff;
      cursor: pointer;
      transition: opacity .15s, transform .1s;
      white-space: nowrap;
      align-self: flex-end;
    }
    .push-single:active { transform: scale(.95); }
    .push-single:disabled { opacity: .35; pointer-events: none; }

    /* ── EMPTY STATE ── */
    .empty { text-align: center; padding: 48px 24px; color: var(--muted); font-size: 13px; }
    .empty-icon { font-size: 36px; margin-bottom: 12px; }

    /* ── LOADING SPINNER ── */
    .spinner {
      display: inline-block;
      width: 14px; height: 14px;
      border: 2px solid var(--border);
      border-top-color: var(--gold);
      border-radius: 50%;
      animation: spin .6s linear infinite;
      margin-right: 6px;
      vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>

      { id: "mckenzie-main",    label: "Screen 1", sub: "Main Menu" },

    ];

    function money(value) {
      const n = Number(value);
      if (Number.isNaN(n)) return "";
      return Number.isInteger(n) ? String(n) : n.toFixed(2);
    }

    function makeRows(screenId) {
      return (ITEMS_BY_SCREEN[screenId] || []).map(item => ({
        ...item, livePrice: item.defaultPrice, draftPrice: String(item.defaultPrice), selected: false
      }));
    }

    function App() {
      const [apiBase]               = useState(DEFAULT_API_BASE);
      const [screenId, setScreenId] = useState("mckenzie-main");
      const [rows, setRows]         = useState(() => makeRows("mckenzie-main"));
      const [search, setSearch]     = useState("");
      const [status, setStatus]     = useState({ msg: "Ready.", type: "info" });
      const [loading, setLoading]   = useState(false);

      function switchScreen(id) {
        setScreenId(id);
        setSearch("");
        setRows(makeRows(id));
        setStatus({ msg: "Switching…", type: "info" });
      }

      const filteredRows = useMemo(() => {
        const q = search.trim().toLowerCase();
        if (!q) return rows;
        return rows.filter(r => r.name.toLowerCase().includes(q) || r.id.toLowerCase().includes(q));
      }, [rows, search]);

      const selectedCount = rows.filter(r => r.selected).length;

      async function loadFromBackend(sid) {
        const target = sid || screenId;
        setLoading(true);
        try {
          const res = await fetch(`${apiBase}/screens/${encodeURIComponent(target)}/prices`, { cache: "no-store" });
          if (!res.ok) throw new Error("Failed to load");
          const data = await res.json();
          setRows(prev => prev.map(row => {
            const inc = data[row.id];
            return inc !== undefined ? { ...row, livePrice: inc, draftPrice: String(inc) } : row;
          }));
          setStatus({ msg: "Prices loaded.", type: "ok" });
        } catch(e) {
          setStatus({ msg: e.message || "Could not load prices.", type: "err" });
        } finally { setLoading(false); }
      }

      async function pushSelected() {
        const updates = {};
        rows.forEach(r => { if (r.selected && r.draftPrice !== "") updates[r.id] = Number(r.draftPrice); });
        if (!Object.keys(updates).length) { setStatus({ msg: "Select items first.", type: "info" }); return; }
        setLoading(true);
        try {
          const res = await fetch(`${apiBase}/screens/${encodeURIComponent(screenId)}/prices`, {
            method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(updates)
          });
          if (!res.ok) { const e = await res.json().catch(() => ({})); throw new Error(e.error || "Push failed"); }
          const data = await res.json();
          setRows(prev => prev.map(r => ({
            ...r,
            livePrice: data.prices[r.id] ?? r.livePrice,
            draftPrice: data.prices[r.id] !== undefined ? String(data.prices[r.id]) : r.draftPrice,
            selected: false
          })));
          setStatus({ msg: `Pushed ${Object.keys(updates).length} update(s).`, type: "ok" });
        } catch(e) { setStatus({ msg: e.message || "Push failed.", type: "err" }); }
        finally { setLoading(false); }
      }

      async function pushSingle(row) {
        setLoading(true);
        try {
          const res = await fetch(`${apiBase}/screens/${encodeURIComponent(screenId)}/prices`, {
            method: "POST", headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ [row.id]: Number(row.draftPrice) })
          });
          if (!res.ok) { const e = await res.json().catch(() => ({})); throw new Error(e.error || "Push failed"); }
          const data = await res.json();
          setRows(prev => prev.map(r => r.id === row.id ? {
            ...r, livePrice: data.prices[row.id], draftPrice: String(data.prices[row.id]), selected: false
