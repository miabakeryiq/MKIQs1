    body { background: #f8fafc; font-family: system-ui, sans-serif; color: #0f172a; }
    #root { min-height: 100vh; }
    input, button, select { font-family: inherit; }
  </style>
</head>

        {"id":"kidney_l","name":"Kidney L","defaultPrice":15},
        {"id":"porridge_oatmeal_s","name":"Oatmeal S","defaultPrice":5},

        {"id":"porridge_peanut_s","name":"Peanut S","defaultPrice":5},
        {"id":"porridge_peanut_l","name":"Peanut L","defaultPrice":8},

        {"id":"porridge_plantain_l","name":"Plantain L","defaultPrice":8},
        {"id":"porridge_carrot_s","name":"Carrot S","defaultPrice":5},
        {"id":"porridge_carrot_l","name":"Carrot L","defaultPrice":8},
        {"id":"porridge_cornmeal_s","name":"Cornmeal S","defaultPrice":5},
        {"id":"porridge_cornmeal_l","name":"Cornmeal L","defaultPrice":8},
        {"id":"patty_curry_chicken","name":"Curry Chicken Patty","defaultPrice":3.5},
        {"id":"patty_beef_spicy","name":"Beef Patty (Spicy)","defaultPrice":3.5},
        {"id":"patty_beef_mild","name":"Beef Patty Mild","defaultPrice":3.5},
        {"id":"patty_beefy_cheese","name":"Beefy Cheese Patty","defaultPrice":3.5},
        {"id":"patty_veggie","name":"Veggie Patty","defaultPrice":3.5},
        {"id":"patty_spinach","name":"Spinach Patty","defaultPrice":4.0},
        {"id":"patty_spinach_cheese","name":"Spinach w/ Cheese Patty","defaultPrice":4.5},
        {"id":"patty_coco_bread","name":"Coco Bread","defaultPrice":1.5},
        {"id":"soup_chicken_s","name":"Soup Chicken S","defaultPrice":5},
        {"id":"soup_chicken_l","name":"Soup Chicken L","defaultPrice":8},
        {"id":"soup_beef_s","name":"Soup Beef S","defaultPrice":5},
        {"id":"soup_beef_l","name":"Soup Beef L","defaultPrice":8},
        {"id":"soup_red_peas_s","name":"Soup Red Peas S","defaultPrice":5},
        {"id":"soup_red_peas_l","name":"Soup Red Peas L","defaultPrice":8},
        {"id":"soup_goat_s","name":"Soup Goat S","defaultPrice":10},
        {"id":"soup_goat_l","name":"Soup Goat L","defaultPrice":8},
        {"id":"soup_cowfoot_s","name":"Soup Cowfoot S","defaultPrice":5},
        {"id":"soup_cowfoot_l","name":"Soup Cowfoot L","defaultPrice":8},
        {"id":"bev_dg_soda","name":"D & G Soda","defaultPrice":3.0},
        {"id":"bev_snapple","name":"Snapple","defaultPrice":2.5},
        {"id":"bev_tropical_rhythm","name":"Tropical Rhythm","defaultPrice":2.5},
        {"id":"bev_canned_soda","name":"Canned Soda","defaultPrice":1.0},
        {"id":"bev_water","name":"Water","defaultPrice":1.0}
      ],
      "mckenzie-operate": [
        {"id":"jerk_wings_s","name":"Jerk Wings S","defaultPrice":0},
        {"id":"jerk_wings_m","name":"Jerk Wings M","defaultPrice":0},
        {"id":"jerk_wings_l","name":"Jerk Wings L","defaultPrice":0},
        {"id":"stew_chicken_s","name":"Stew Chicken S","defaultPrice":0},
        {"id":"stew_chicken_m","name":"Stew Chicken M","defaultPrice":0},
        {"id":"stew_chicken_l","name":"Stew Chicken L","defaultPrice":0},
        {"id":"fried_chicken_s","name":"Fried Chicken S","defaultPrice":0},
        {"id":"fried_chicken_m","name":"Fried Chicken M","defaultPrice":0},
        {"id":"fried_chicken_l","name":"Fried Chicken L","defaultPrice":0},
        {"id":"escovitch_chicken_s","name":"Escovitch Chicken S","defaultPrice":0},
        {"id":"escovitch_chicken_m","name":"Escovitch Chicken M","defaultPrice":0},
        {"id":"escovitch_chicken_l","name":"Escovitch Chicken L","defaultPrice":0},
        {"id":"jerk_chicken_s","name":"Jerk Chicken S","defaultPrice":0},
        {"id":"jerk_chicken_m","name":"Jerk Chicken M","defaultPrice":0},
        {"id":"jerk_chicken_l","name":"Jerk Chicken L","defaultPrice":0},
        {"id":"curry_chicken_s","name":"Curry Chicken S","defaultPrice":0},
        {"id":"curry_chicken_m","name":"Curry Chicken M","defaultPrice":0},
        {"id":"curry_chicken_l","name":"Curry Chicken L","defaultPrice":0},
        {"id":"stew_peas_s","name":"Stew Peas S","defaultPrice":0},
        {"id":"stew_peas_m","name":"Stew Peas M","defaultPrice":0},
        {"id":"stew_peas_l","name":"Stew Peas L","defaultPrice":0},
        {"id":"escovitch_whiting_s","name":"Escovitch Whiting S","defaultPrice":0},
        {"id":"escovitch_whiting_m","name":"Escovitch Whiting M","defaultPrice":0},
        {"id":"escovitch_whiting_l","name":"Escovitch Whiting L","defaultPrice":0},
        {"id":"curry_goat_s","name":"Curry Goat S","defaultPrice":0},
        {"id":"curry_goat_m","name":"Curry Goat M","defaultPrice":0},
        {"id":"curry_goat_l","name":"Curry Goat L","defaultPrice":0},
        {"id":"oxtail_s","name":"Oxtail S","defaultPrice":0},
        {"id":"oxtail_m","name":"Oxtail M","defaultPrice":0},
        {"id":"oxtail_l","name":"Oxtail L","defaultPrice":0},
        {"id":"salmon_s","name":"Salmon S","defaultPrice":0},
        {"id":"salmon_m","name":"Salmon M","defaultPrice":0},
        {"id":"salmon_l","name":"Salmon L","defaultPrice":0},
        {"id":"glazed_salmon_s","name":"Glazed Salmon S","defaultPrice":0},
        {"id":"glazed_salmon_m","name":"Glazed Salmon M","defaultPrice":0},
        {"id":"glazed_salmon_l","name":"Glazed Salmon L","defaultPrice":0},
        {"id":"snapper_s","name":"Snapper S","defaultPrice":0},
        {"id":"snapper_m","name":"Snapper M","defaultPrice":0},
        {"id":"snapper_l","name":"Snapper L","defaultPrice":0},
        {"id":"chicken_jerk_quarter","name":"Jerk Chicken — Quarter","defaultPrice":0},
        {"id":"chicken_jerk_half","name":"Jerk Chicken — Half","defaultPrice":0},
        {"id":"chicken_fry_quarter","name":"Fry Chicken — Quarter","defaultPrice":0},
        {"id":"chicken_fry_half","name":"Fry Chicken — Half","defaultPrice":0},
        {"id":"chicken_wings_5pc","name":"Wings (5 pcs.)","defaultPrice":0},
        {"id":"side_cabbage_s","name":"Steamed Cabbage S","defaultPrice":0},
        {"id":"side_cabbage_m","name":"Steamed Cabbage M","defaultPrice":0},
        {"id":"side_cabbage_l","name":"Steamed Cabbage L","defaultPrice":0},
        {"id":"side_white_rice_s","name":"White Rice S","defaultPrice":0},
        {"id":"side_white_rice_m","name":"White Rice M","defaultPrice":0},
        {"id":"side_white_rice_l","name":"White Rice L","defaultPrice":0},
        {"id":"side_mac_cheese_s","name":"Mac & Cheese S","defaultPrice":0},
        {"id":"side_mac_cheese_m","name":"Mac & Cheese M","defaultPrice":0},
        {"id":"side_mac_cheese_l","name":"Mac & Cheese L","defaultPrice":0},
        {"id":"side_festival_s","name":"Festival S","defaultPrice":0},
        {"id":"side_festival_m","name":"Festival M","defaultPrice":0},
        {"id":"side_festival_l","name":"Festival L","defaultPrice":0},
        {"id":"side_fried_plantain_s","name":"Fried Plantain S","defaultPrice":0},
        {"id":"side_fried_plantain_m","name":"Fried Plantain M","defaultPrice":0},
        {"id":"side_fried_plantain_l","name":"Fried Plantain L","defaultPrice":0},
        {"id":"side_fried_dumplings_s","name":"Fried Dumplings S","defaultPrice":0},
        {"id":"side_fried_dumplings_m","name":"Fried Dumplings M","defaultPrice":0},
        {"id":"side_fried_dumplings_l","name":"Fried Dumplings L","defaultPrice":0},
        {"id":"side_pasta_s","name":"Mckenzie's Pasta S","defaultPrice":0},
        {"id":"side_pasta_m","name":"Mckenzie's Pasta M","defaultPrice":0},
        {"id":"side_pasta_l","name":"Mckenzie's Pasta L","defaultPrice":0}
      ]
    };
 
    const SCREENS = [
      { id: "mckenzie-main",    label: "Screen 1 — Main Menu" },
      { id: "mckenzie-operate", label: "Screen 2 — Operate Menu" }
    ];
 
    function money(value) {
      const n = Number(value);
      if (Number.isNaN(n)) return "";
      return Number.isInteger(n) ? String(n) : n.toFixed(2);
    }
 
    function makeRows(screenId) {
      return (ITEMS_BY_SCREEN[screenId] || []).map(item => ({
        ...item, livePrice: item.defaultPrice, draftPrice: item.defaultPrice, selected: false
      }));
    }
 
    function MenuMiddlewareApp() {
      const [apiBase, setApiBase]   = useState(DEFAULT_API_BASE);
      const [screenId, setScreenId] = useState("mckenzie-main");
      const [rows, setRows]         = useState(() => makeRows("mckenzie-main"));
      const [search, setSearch]     = useState("");
      const [status, setStatus]     = useState("Ready.");
      const [loading, setLoading]   = useState(false);
 
      function switchScreen(newId) {
        setScreenId(newId);
        setSearch("");
        setRows(makeRows(newId));
        setStatus("Switched — loading prices…");
      }
 
      const filteredRows = useMemo(() => {
        const q = search.trim().toLowerCase();
        if (!q) return rows;
        return rows.filter(r => r.name.toLowerCase().includes(q) || r.id.toLowerCase().includes(q));
      }, [rows, search]);
 
      const selectedCount = rows.filter(r => r.selected).length;
 
      async function loadFromBackend(sid) {
        const target = sid || screenId;
        setLoading(true);
        try {
          const res = await fetch(`${apiBase}/screens/${encodeURIComponent(target)}/prices`, { cache: "no-store" });
          if (!res.ok) throw new Error("Failed to load prices");
          const data = await res.json();
          setRows(prev => prev.map(row => {
            const inc = data[row.id];
            return { ...row, livePrice: inc ?? row.livePrice, draftPrice: inc ?? row.draftPrice };
          }));
          setStatus(`Loaded live prices for ${target}.`);
        } catch (e) {
          setStatus(e.message || "Could not load prices.");
        } finally { setLoading(false); }
      }
 
      async function pushSelected() {
        const updates = {};
        rows.forEach(r => { if (r.selected && r.draftPrice !== "") updates[r.id] = Number(r.draftPrice); });
        if (!Object.keys(updates).length) { setStatus("Select at least one row to push."); return; }
        setLoading(true);
        try {
          const res = await fetch(`${apiBase}/screens/${encodeURIComponent(screenId)}/prices`, {
            method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(updates)
          });
          if (!res.ok) { const err = await res.json().catch(() => ({})); throw new Error(err.error || "Push failed"); }
          const data = await res.json();
          setRows(prev => prev.map(r => ({
            ...r, livePrice: data.prices[r.id] ?? r.livePrice, draftPrice: data.prices[r.id] ?? r.draftPrice, selected: false
          })));
          setStatus(`Pushed ${Object.keys(updates).length} update(s) to ${screenId}.`);
        } catch (e) { setStatus(e.message || "Could not push."); }
        finally { setLoading(false); }
      }
 
      async function pushSingle(row) {
        setLoading(true);
        try {
          const res = await fetch(`${apiBase}/screens/${encodeURIComponent(screenId)}/prices`, {
            method: "POST", headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ [row.id]: Number(row.draftPrice) })
          });
          if (!res.ok) { const err = await res.json().catch(() => ({})); throw new Error(err.error || "Push failed"); }
          const data = await res.json();
          setRows(prev => prev.map(r => r.id === row.id
            ? { ...r, livePrice: data.prices[row.id], draftPrice: data.prices[row.id], selected: false } : r));
          setStatus(`Updated ${row.name} on ${screenId}.`);
        } catch (e) { setStatus(e.message || "Could not push row."); }
        finally { setLoading(false); }
      }
 
      useEffect(() => { loadFromBackend(screenId); }, [screenId]);
 
      const panel = { background: "#fff", border: "1px solid #e2e8f0", borderRadius: 12, padding: 16, boxShadow: "0 8px 28px rgba(15,23,42,.05)" };
      const activeScreen = SCREENS.find(s => s.id === screenId);
 
      return React.createElement("div", { style: { minHeight: "100vh", background: "#f8fafc", fontFamily: "system-ui, sans-serif", color: "#0f172a" } },
        React.createElement("div", { style: { maxWidth: 1200, margin: "0 auto", padding: 24 } },
 
          React.createElement("div", { style: { marginBottom: 18 } },
            React.createElement("h1", { style: { margin: 0, fontSize: 28 } }, "Menu Middleware"),
            React.createElement("div", { style: { color: "#64748b", marginTop: 6 } }, "Push price updates to the overlay player backend.")
          ),
 
          // Screen tabs
          React.createElement("div", { style: { display: "flex", gap: 8, marginBottom: 16 } },
            SCREENS.map(s => React.createElement("button", {
              key: s.id, onClick: () => switchScreen(s.id),
              style: {
                padding: "10px 22px", borderRadius: 10, cursor: "pointer", fontWeight: 700, fontSize: 14,
                border: "2px solid", transition: "all .15s",
                borderColor: screenId === s.id ? "#0f172a" : "#e2e8f0",
                background: screenId === s.id ? "#0f172a" : "#fff",
                color: screenId === s.id ? "#fff" : "#64748b"
              }
            }, s.label))
          ),
 
          // Controls
          React.createElement("div", { style: { ...panel, marginBottom: 16, display: "grid", gridTemplateColumns: "1.6fr 1fr auto auto", gap: 12, alignItems: "end" } },
            React.createElement("div", null,
              React.createElement("div", { style: { fontSize: 12, color: "#64748b", marginBottom: 6 } }, "API base"),
              React.createElement("input", { value: apiBase, onChange: e => setApiBase(e.target.value), style: { width: "100%", padding: "10px 12px", borderRadius: 8, border: "1px solid #cbd5e1" } })
            ),
            React.createElement("div", null,
              React.createElement("div", { style: { fontSize: 12, color: "#64748b", marginBottom: 6 } }, "Search"),
              React.createElement("input", { value: search, onChange: e => setSearch(e.target.value), placeholder: "Find item…", style: { width: "100%", padding: "10px 12px", borderRadius: 8, border: "1px solid #cbd5e1" } })
            ),
            React.createElement("button", { onClick: () => loadFromBackend(), disabled: loading, style: { padding: "10px 14px", borderRadius: 8, border: 0, background: "#0f172a", color: "#fff", cursor: "pointer" } }, "Reload"),
            React.createElement("button", { onClick: pushSelected, disabled: loading, style: { padding: "10px 14px", borderRadius: 8, border: 0, background: "#16a34a", color: "#fff", cursor: "pointer" } }, "Push selected")
          ),
 
          // Status
          React.createElement("div", { style: { ...panel, marginBottom: 16, display: "flex", justifyContent: "space-between", alignItems: "center" } },
            React.createElement("div", { style: { color: "#334155" } },
              React.createElement("strong", null, activeScreen?.label), " · ", status
            ),
            React.createElement("div", { style: { color: "#64748b" } }, `Selected: ${selectedCount} / ${rows.length}`)
          ),
 
          // Table
          React.createElement("div", { style: { ...panel, padding: 0, overflow: "hidden" } },
            React.createElement("div", { style: { maxHeight: "70vh", overflow: "auto" } },
              React.createElement("table", { style: { width: "100%", borderCollapse: "collapse" } },
                React.createElement("thead", { style: { position: "sticky", top: 0, background: "#f8fafc", zIndex: 1 } },
                  React.createElement("tr", null,
                    ["Push","Item","Overlay ID","Live price","Draft price","Action"].map(h =>
                      React.createElement("th", { key: h, style: { padding: 12, textAlign: h === "Action" ? "right" : "left", borderBottom: "1px solid #e2e8f0", fontSize: 13 } }, h)
                    )
                  )
                ),
                React.createElement("tbody", null,
                  filteredRows.map(row => React.createElement("tr", { key: row.id },
                    React.createElement("td", { style: { padding: 12, borderBottom: "1px solid #f1f5f9" } },
                      React.createElement("input", { type: "checkbox", checked: row.selected, onChange: e => setRows(prev => prev.map(r => r.id === row.id ? { ...r, selected: e.target.checked } : r)) })
                    ),
                    React.createElement("td", { style: { padding: 12, borderBottom: "1px solid #f1f5f9", fontWeight: 600 } }, row.name),
                    React.createElement("td", { style: { padding: 12, borderBottom: "1px solid #f1f5f9", color: "#64748b", fontFamily: "monospace", fontSize: 12 } }, row.id),
                    React.createElement("td", { style: { padding: 12, borderBottom: "1px solid #f1f5f9" } }, money(row.livePrice)),
                    React.createElement("td", { style: { padding: 12, borderBottom: "1px solid #f1f5f9" } },
                      React.createElement("input", {
                        value: row.draftPrice,
                        onChange: e => setRows(prev => prev.map(r => r.id === row.id ? { ...r, draftPrice: e.target.value } : r)),
                        style: { width: 110, padding: "8px 10px", borderRadius: 8, border: "1px solid #cbd5e1" }
                      })
                    ),
                    React.createElement("td", { style: { padding: 12, borderBottom: "1px solid #f1f5f9", textAlign: "right" } },
                      React.createElement("button", {
                        onClick: () => pushSingle(row), disabled: loading || row.draftPrice === "",
                        style: { padding: "8px 12px", borderRadius: 8, border: 0, background: "#2563eb", color: "#fff", cursor: "pointer" }
                      }, "Push row")
                    )
                  ))
                )
              )
            )
          )
        )
      );
    }
 
    ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(MenuMiddlewareApp));
    }); // end DOMContentLoaded
  </script>
</body>
</html>
